<!doctype html>
<html>
<head>
    <title>글쓰기</title>
</head>
<body>
<h1>글쓰기</h1>
<form method="post" action="/create">
    <label>작성자: <input name="writer" required maxlength="50"></label><br>
    <label>제목: <input name="title" required maxlength="200"></label><br>
    <label>내용:<br>
        <textarea name="content" rows="5" cols="50" required></textarea>
    </label><br>
    <button type="submit">등록</button>
    <a href="/">목록</a>
</form>
</body>
</html>
